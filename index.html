<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Time</title>
    <style>
        body {
            background-color: #000000; 
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; 
            cursor: pointer;
        }

        /* --- FLIP CLOCK STYLES --- */
        .clock-container {
            display: flex;
            gap: 2vw;
        }

        .flip-box {
            position: relative;
            width: 22vw;
            height: 24vw;
            border-radius: 1vw;
            font-size: 18vw; 
            font-weight: bold;
            perspective: 1000px; 
            box-shadow: 0 1vw 3vw rgba(0,0,0,0.9);
            background-color: #1a1a1a;
        }

        .flip-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 0.4vw;
            background-color: #000000;
            transform: translateY(-50%);
            z-index: 10;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 50%;
            background-color: #1a1a1a;
            color: #e6e6e6;
            left: 0;
            overflow: hidden;
            backface-visibility: hidden;
        }

        .flap.top {
            top: 0;
            border-radius: 1vw 1vw 0 0;
            transform-origin: bottom;
        }

        .flap.bottom {
            bottom: 0;
            border-radius: 0 0 1vw 1vw;
            transform-origin: top;
        }

        .flap span {
            position: absolute;
            width: 100%;
            height: 24vw;
            line-height: 24vw;
            text-align: center;
            left: 0;
        }

        .flap.top span { top: 0; }
        .flap.bottom span { bottom: 0; }

        .static { z-index: 1; }
        .flipping { z-index: 2; }

        /* Initial states for the flipping layers */
        .flipping.top { transform: rotateX(0deg); }
        .flipping.bottom { transform: rotateX(90deg); }

        /* The Keyframe Animations */
        @keyframes flipTop {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }

        @keyframes flipBottom {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        /* Classes applied via JS to trigger the single flip */
        .flipping.top.animate {
            animation: flipTop 0.25s ease-in forwards;
        }

        .flipping.bottom.animate {
            animation: flipBottom 0.25s ease-out 0.25s forwards;
        }

        /* AM/PM inside the Hour box */
        #am-pm-display {
            position: absolute;
            bottom: 1.5vw;
            left: 1.5vw;
            font-size: 3vw;
            color: #777777;
            z-index: 20;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- STOPWATCH STYLES --- */
        #stopwatchContainer {
            position: absolute;
            bottom: 30px;
            text-align: center;
            color: #666666;
            transition: color 0.3s;
            z-index: 30;
        }
        #stopwatchContainer:hover { color: #ffffff; }
        #stopwatch { font-size: 3vw; letter-spacing: 3px; font-weight: normal; }
        #stopwatchHint { font-size: 0.8vw; letter-spacing: 1px; margin-top: 5px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="flip-box" id="hours" data-val="">
            <div class="flap static top"><span>00</span></div>
            <div class="flap static bottom"><span>00</span></div>
            <div class="flap flipping top"><span>00</span></div>
            <div class="flap flipping bottom"><span>00</span></div>
            <div id="am-pm-display">--</div>
        </div>

        <div class="flip-box" id="minutes" data-val="">
            <div class="flap static top"><span>00</span></div>
            <div class="flap static bottom"><span>00</span></div>
            <div class="flap flipping top"><span>00</span></div>
            <div class="flap flipping bottom"><span>00</span></div>
        </div>

        <div class="flip-box" id="seconds" data-val="">
            <div class="flap static top"><span>00</span></div>
            <div class="flap static bottom"><span>00</span></div>
            <div class="flap flipping top"><span>00</span></div>
            <div class="flap flipping bottom"><span>00</span></div>
        </div>
    </div>

    <div id="stopwatchContainer">
        <div id="stopwatch">00:00:00</div>
        <div id="stopwatchHint">Click to Start/Pause | Double-click to Reset</div>
    </div>

    <script>
        // --- FLIP ANIMATION ENGINE ---
        function triggerFlip(unitId, newValue) {
            const box = document.getElementById(unitId);
            const currentValue = box.getAttribute('data-val');
            
            if (currentValue === newValue) return; 
            
            const topStatic = box.querySelector('.static.top span');
            const bottomStatic = box.querySelector('.static.bottom span');
            const topFlipping = box.querySelector('.flipping.top');
            const bottomFlipping = box.querySelector('.flipping.bottom');
            const topFlippingSpan = topFlipping.querySelector('span');
            const bottomFlippingSpan = bottomFlipping.querySelector('span');

            // Handle first load instantly without animation
            if (currentValue === "") {
                box.setAttribute('data-val', newValue);
                topStatic.textContent = newValue;
                bottomStatic.textContent = newValue;
                topFlippingSpan.textContent = newValue;
                bottomFlippingSpan.textContent = newValue;
                return;
            }

            box.setAttribute('data-val', newValue);

            // Prepare the fold layers
            topStatic.textContent = newValue; 
            bottomFlippingSpan.textContent = newValue; 
            topFlippingSpan.textContent = currentValue; 
            bottomStatic.textContent = currentValue; 

            // Trigger the single 3D CSS animation
            topFlipping.classList.add('animate');
            bottomFlipping.classList.add('animate');

            // Reset classes seamlessly after animation finishes (500ms)
            setTimeout(() => {
                topFlipping.classList.remove('animate');
                bottomFlipping.classList.remove('animate');
                
                // Align everything to the new value instantly
                topFlippingSpan.textContent = newValue;
                bottomStatic.textContent = newValue;
            }, 500); 
        }

        // --- TIME SYNC LOGIC ---
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                timeZone: 'Asia/Kolkata',
                hour12: true, 
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            const parts = timeString.split(' ');
            const timeParts = parts[0].split(':');
            
            triggerFlip('hours', timeParts[0]);
            triggerFlip('minutes', timeParts[1]);
            triggerFlip('seconds', timeParts[2]);
            
            document.getElementById('am-pm-display').textContent = parts[1];
        }

        updateTime();
        setInterval(updateTime, 1000);

        // --- FULLSCREEN & CURSOR HIDE LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {});
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // Click anywhere to fullscreen (unless clicking the stopwatch)
        document.body.addEventListener('click', function(e) {
            if (!e.target.closest('#stopwatchContainer')) {
                toggleFullScreen();
            }
        });

        // Hide mouse cursor after 3 seconds of being idle
        let cursorTimeout;
        document.addEventListener('mousemove', () => {
            document.body.style.cursor = 'pointer'; 
            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => {
                document.body.style.cursor = 'none'; 
            }, 3000);
        });

        // --- STOPWATCH LOGIC ---
        let swInterval, swElapsedTime = 0, swIsRunning = false, swLastTime = 0;
        const swDisplay = document.getElementById('stopwatch');
        const swContainer = document.getElementById('stopwatchContainer');

        function updateStopwatch() {
            const now = Date.now();
            swElapsedTime += (now - swLastTime);
            swLastTime = now;

            let totalSeconds = Math.floor(swElapsedTime / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            swDisplay.textContent = 
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');
        }

        swContainer.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (swIsRunning) {
                clearInterval(swInterval);
                swIsRunning = false;
            } else {
                swLastTime = Date.now();
                swInterval = setInterval(updateStopwatch, 100); 
                swIsRunning = true;
            }
        });

        swContainer.addEventListener('dblclick', (e) => {
            e.stopPropagation(); 
            clearInterval(swInterval);
            swIsRunning = false;
            swElapsedTime = 0;
            swDisplay.textContent = "00:00:00";
        });
    </script>
</body>
</html>
